# Maxbuy Ventures — production stack (app + PostgreSQL + Nginx).
# Copy .env.production.example to .env and fill in secrets before `docker compose up`.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-maxbuy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-maxbuy_erp}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-maxbuy} -d ${POSTGRES_DB:-maxbuy_erp}']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-maxbuy}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-maxbuy_erp}?schema=public
    depends_on:
      db:
        condition: service_healthy
    expose:
      - '3000'

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/certbot/www:/var/www/certbot:ro
    depends_on:
      - app

volumes:
  db_data:
