# Maxbuy Ventures — Nginx reverse proxy.
# Replace maxbuy.example.com with your domain. HTTPS uses certs mounted at
# /etc/nginx/certs (see docs/DEPLOY.md for the certbot setup).

upstream maxbuy_app {
    server app:3000;
}

# HTTP: serve the ACME challenge, redirect everything else to HTTPS.
server {
    listen 80;
    server_name maxbuy.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    http2 on;
    server_name maxbuy.example.com;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Allow large product-image / import uploads.
    client_max_body_size 10m;

    # The app sets its own security headers (CSP etc.); just add HSTS at the edge.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    location / {
        proxy_pass http://maxbuy_app;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
    }
}
