name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Typecheck, lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        # A dummy JWT_SECRET satisfies runtime guards if any code path is
        # evaluated at build time; no database connection is needed to build.
        env:
          JWT_SECRET: ci-build-placeholder-secret-not-used-at-runtime
        run: npm run build
