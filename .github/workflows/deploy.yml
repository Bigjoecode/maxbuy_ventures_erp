name: Deploy to VPS

# Manual trigger. Configure these repo secrets first (Settings → Secrets):
#   VPS_HOST, VPS_USER, VPS_SSH_KEY, VPS_PATH (path to the checked-out repo on the server)
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.VPS_PATH }}"
            git pull --ff-only
            docker compose pull || true
            docker compose up -d --build
            docker image prune -f
